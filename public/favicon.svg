<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#ffffff"/>
  <!-- Rachis (central axis, vertical and centered) -->
  <line x1="16" y1="4" x2="16" y2="21" stroke="#8B6914" stroke-width="1.2"/>
  <!-- Stem (curves at the bottom only) -->
  <path d="M 16 21 Q 17 25 20 30" stroke="#8B6914" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Apex tip -->
  <ellipse cx="16" cy="3" rx="1" ry="2.2" fill="#8B6914"/>
  <!-- Pair 1 (top, smallest) -->
  <ellipse cx="13" cy="7"  rx="1.2" ry="3.8" fill="#8B6914" transform="rotate(-38 13 7)"/>
  <ellipse cx="19" cy="7"  rx="1.2" ry="3.8" fill="#8B6914" transform="rotate(38 19 7)"/>
  <!-- Pair 2 -->
  <ellipse cx="12.5" cy="11" rx="1.3" ry="4" fill="#8B6914" transform="rotate(-42 12.5 11)"/>
  <ellipse cx="19.5" cy="11" rx="1.3" ry="4" fill="#8B6914" transform="rotate(42 19.5 11)"/>
  <!-- Pair 3 -->
  <ellipse cx="12" cy="15" rx="1.3" ry="4" fill="#8B6914" transform="rotate(-44 12 15)"/>
  <ellipse cx="20" cy="15" rx="1.3" ry="4" fill="#8B6914" transform="rotate(44 20 15)"/>
  <!-- Pair 4 (bottom, largest) -->
  <ellipse cx="12" cy="19" rx="1.2" ry="3.8" fill="#8B6914" transform="rotate(-44 12 19)"/>
  <ellipse cx="20" cy="19" rx="1.2" ry="3.8" fill="#8B6914" transform="rotate(44 20 19)"/>
</svg>